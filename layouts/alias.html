<!DOCTYPE html>
<html>
<head>
  <title>{{ .Permalink }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <meta charset="utf-8">
  <script>
    (function() {
      if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
        var saved = localStorage.getItem('preferred-lang');
        if (saved === 'zh' || saved === 'en') {
          window.location.replace('/' + saved + '/');
          return;
        }
        var langs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
        var preferChinese = langs.some(function(l) { return l.startsWith('zh'); });
        window.location.replace(preferChinese ? '/zh/' : '/en/');
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
</head>
<body></body>
</html>
